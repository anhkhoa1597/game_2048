<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Game 2048</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="page">
      <section class="game-wrapper">
        <header class="game-header">
          <div class="title-menu-wrap">
            <button class="brand-menu-button" id="menuToggle" type="button">
              <span class="hamburger-line"></span>
              <span class="brand-title">2048</span>
            </button>

            <nav class="side-menu hidden" id="sideMenu">
              <div class="menu-section">
                <label for="themeSelect">Theme</label>
                <select id="themeSelect">
                  <option value="classic">Classic</option>
                  <option value="green">Green</option>
                  <option value="dark">Dark</option>
                </select>
              </div>

              <div class="menu-section">
                <label for="boardSizeSelect">Board Size</label>
                <select id="boardSizeSelect">
                  <option value="4">4 x 4</option>
                  <option value="5">5 x 5</option>
                  <option value="6">6 x 6</option>
                  <option value="8">8 x 8</option>
                </select>
              </div>

              <button
                class="menu-action-button"
                id="resetCurrentBoardBtn"
                type="button"
              >
                Reset Current Board
              </button>
            </nav>
          </div>

          <div class="score-group">
            <div class="score-box">
              <span class="score-label">SCORE</span>
              <span class="score-value" id="score">0</span>
            </div>

            <div class="score-box best-box">
              <span class="score-label">BEST</span>
              <span class="score-value" id="best">0</span>
            </div>
          </div>

          <div class="header-actions">
            <button class="feedback-button" type="button">Give Feedback</button>
            <button class="new-game-button" type="button" id="newGameBtn">
              New Game
            </button>
          </div>
        </header>

        <section class="board" id="board">
          <div class="grid-container" id="gridContainer"></div>
          <div class="tile-container" id="tileContainer"></div>

          <div class="game-message hidden" id="gameMessage">
            <p id="messageText">Game Over!</p>

            <div class="message-actions">
              <button type="button" id="keepPlayingBtn">Keep going</button>
              <button type="button" id="tryAgainBtn">Try again</button>
            </div>
          </div>
        </section>

        <div class="bottom-controls">
          <button
            class="power-button"
            id="undoBtn"
            type="button"
            aria-label="Undo"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="32"
              height="32"
              fill="none"
              viewBox="0 0 32 32"
              class="aspect-square h-auto w-full max-w-8 min-w-0 shrink"
            >
              <path
                stroke="currentColor"
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2.5"
                d="M10 25h6.5a8.5 8.5 0 0 0 8.5-8.5v0A8.5 8.5 0 0 0 16.5 8H8m0 0 3.5-4M8 8l3.5 4"
                style="stroke: currentColor; stroke-opacity: 1"
              ></path>
            </svg>
            <span class="power-count" id="undoCount">0</span>
          </button>

          <button
            class="power-button"
            id="swapBtn"
            type="button"
            aria-label="Swap"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="32"
              height="32"
              fill="none"
              viewBox="0 0 32 32"
              class="aspect-square h-auto w-full max-w-8 min-w-0 shrink"
            >
              <path
                stroke="currentColor"
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M18 9h.53a4 4 0 0 1 3.96 3.434L23 16m0 0 3.5-3.5M23 16l-4-2"
                style="stroke: currentColor; stroke-opacity: 1"
              ></path>
              <path
                fill="currentColor"
                fill-rule="evenodd"
                d="M16.006 25.23A4 4 0 0 0 20 29h5a4 4 0 0 0 4-4v-5a4 4 0 0 0-2.19-3.568l-1.689 1.69a3 3 0 0 1-3.463.561l-3.939-1.97A4 4 0 0 0 16 20v.764c.614.55 1 1.347 1 2.236 0 .885-.384 1.681-.994 2.23"
                clip-rule="evenodd"
                style="fill: currentColor; fill-opacity: 1"
              ></path>
              <path
                stroke="currentColor"
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M14 23h-.53a4 4 0 0 1-3.96-3.434L9 16m0 0-3.5 3.5M9 16l4 2"
                style="stroke: currentColor; stroke-opacity: 1"
              ></path>
              <path
                fill="currentColor"
                fill-rule="evenodd"
                d="M3 7a4 4 0 0 1 4-4h5a4 4 0 0 1 3.993 3.77A3 3 0 0 0 15 9a3 3 0 0 0 1 2.236V12c0 1.361-.68 2.564-1.72 3.286l-3.938-1.97a3 3 0 0 0-3.463.563l-1.69 1.689A4 4 0 0 1 3 12z"
                clip-rule="evenodd"
                style="fill: currentColor; fill-opacity: 1"
              ></path>
            </svg>
            <span class="power-count" id="swapCount">0</span>
          </button>

          <button
            class="power-button"
            id="teleportBtn"
            type="button"
            aria-label="Teleport"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="32"
              height="32"
              fill="none"
              viewBox="0 0 32 32"
              class="aspect-square h-auto w-full max-w-8 min-w-0 shrink"
            >
              <path
                stroke="currentColor"
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="m19 13-6 6m6-6 .5 5m-.5-5-5-.5"
                style="stroke: currentColor; stroke-opacity: 1"
              ></path>
              <path
                fill="currentColor"
                fill-rule="evenodd"
                d="M20 5.5h5A1.5 1.5 0 0 1 26.5 7v5a1.5 1.5 0 0 1-1.5 1.5h-2.935l.25 2.5H25a4 4 0 0 0 4-4V7a4 4 0 0 0-4-4h-5a4 4 0 0 0-4 4v2.685l2.5.25V7A1.5 1.5 0 0 1 20 5.5M11.757 16H6.6A3.6 3.6 0 0 0 3 19.6v5.8A3.6 3.6 0 0 0 6.6 29h5.8a3.6 3.6 0 0 0 3.6-3.6v-5.157l-.879.878a3 3 0 1 1-4.242-4.242z"
                clip-rule="evenodd"
                style="fill: currentColor; fill-opacity: 1"
              ></path>
            </svg>
            <span class="power-count" id="teleportCount">0</span>
          </button>
        </div>

        <footer class="footer-text">
          play2048.co © 2014–2026 Gabriele Cirulli. All rights reserved.
        </footer>
      </section>
    </main>

    <script src="main.js"></script>
  </body>
</html>
